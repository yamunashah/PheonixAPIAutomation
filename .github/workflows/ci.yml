# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Phoenix API Automation WorkFlow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule: #set the schedule midnight 00:00 UTC
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      env:
         description: "Choose Environment[Default:qa]"
         type: choice
         required: true
         options: [dev,qa,uat]
         default: qa
      suiteXMlFile:
         description: "Choose suiteXML File[Default:testng.xml]"
         type: choice
         required: true
         options: [testng.xml,smoke.xml]
         default: testng.xml
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Test with Maven
      run:  mvn clean test -DsuiteXMlFile="${{ github.event.inputs.suiteXMlFile }}" -Denv="${{ github.event.inputs.env }}"

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Upload Artifact
        path: target/surefire-reports/API Automation/*.html
        retention-days: 10
    
